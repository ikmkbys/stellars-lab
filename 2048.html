<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 // STELLAR SYS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 800px; height: 300px; overflow: hidden;
    background: #050510;
    font-family: 'Courier New', monospace;
    color: #c0d4ff;
    display: flex; align-items: center; justify-content: center;
  }

  #app {
    width: 800px; height: 300px;
    display: flex; align-items: center;
    padding: 10px 14px; gap: 16px;
  }

  /* ── 左: グリッドエリア ── */
  #grid-area { flex: 0 0 256px; display: flex; flex-direction: column; align-items: center; gap: 6px; }

  #grid-container {
    position: relative;
    width: 248px; height: 248px;
    background: rgba(10, 10, 40, 0.8);
    border: 1px solid rgba(100, 120, 220, 0.35);
    border-radius: 6px; padding: 6px;
    box-shadow: 0 0 12px rgba(0,150,255,0.12), inset 0 0 20px rgba(0,0,60,0.6);
  }

  /* 背景セル */
  #grid-bg {
    display: grid;
    grid-template-columns: repeat(4, 55px);
    grid-template-rows: repeat(4, 55px);
    gap: 5px;
    position: absolute; top: 6px; left: 6px;
  }
  .bg-cell {
    background: rgba(20,20,60,0.5);
    border: 1px solid rgba(60,80,160,0.2);
    border-radius: 3px;
  }

  /* タイルレイヤー（absoluteで個別配置） */
  #grid-tiles { position: absolute; top: 6px; left: 6px; width: 236px; height: 236px; }

  .tile {
    position: absolute;
    width: 55px; height: 55px;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 18px; letter-spacing: 0.5px;
    border: 1px solid rgba(255,255,255,0.12);
    /* スライドアニメーション */
    transition: top 0.12s ease, left 0.12s ease;
  }

  /* 新タイル出現：ぷわっとバウンス */
  @keyframes tileAppear {
    0%   { opacity: 0; transform: scale(0); }
    60%  { opacity: 1; transform: scale(1.2); }
    100% { opacity: 1; transform: scale(1); }
  }
  .tile.new { animation: tileAppear 0.25s ease forwards; }

  /* マージ後のパルス（合体した勝者タイル） */
  @keyframes tileMerge {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.28); filter: brightness(1.8); }
    100% { transform: scale(1); filter: brightness(1); }
  }
  .tile.merged { animation: tileMerge 0.22s ease forwards; }

  /* タイルカラー */
  .tile-0    { background: transparent; border-color: transparent; }
  .tile-2    { background: rgba(20,40,100,0.75);   color: #8ab0ff; box-shadow: 0 0 6px rgba(80,120,255,0.3);   font-size: 18px; }
  .tile-4    { background: rgba(40,20,110,0.80);   color: #a070ff; box-shadow: 0 0 6px rgba(120,80,255,0.3);   font-size: 18px; }
  .tile-8    { background: rgba(80,20,120,0.85);   color: #cc60ff; box-shadow: 0 0 8px rgba(180,60,255,0.35);  font-size: 18px; }
  .tile-16   { background: rgba(140,20,100,0.85);  color: #ff50cc; box-shadow: 0 0 8px rgba(255,60,200,0.4);   font-size: 16px; }
  .tile-32   { background: rgba(0,100,120,0.85);   color: #00ffee; box-shadow: 0 0 10px rgba(0,240,220,0.45);  font-size: 16px; }
  .tile-64   { background: rgba(0,120,160,0.85);   color: #40d4ff; box-shadow: 0 0 10px rgba(40,200,255,0.45); font-size: 16px; }
  .tile-128  { background: rgba(0,120,60,0.85);    color: #40ff90; box-shadow: 0 0 12px rgba(40,255,120,0.5);  font-size: 14px; }
  .tile-256  { background: rgba(60,140,0,0.85);    color: #aaff40; box-shadow: 0 0 12px rgba(160,255,40,0.5);  font-size: 14px; }
  .tile-512  { background: rgba(160,140,0,0.85);   color: #ffee40; box-shadow: 0 0 14px rgba(255,230,40,0.55); font-size: 14px; }
  .tile-1024 { background: rgba(180,80,0,0.85);    color: #ff9020; box-shadow: 0 0 14px rgba(255,140,20,0.6);  font-size: 12px; }
  .tile-2048 {
    background: rgba(240,240,255,0.92); color: #050510; font-size: 12px;
    box-shadow: 0 0 20px rgba(255,255,255,0.9), 0 0 40px rgba(200,220,255,0.7);
  }
  .tile-high { background: rgba(255,230,255,0.92); color: #050510; font-size: 10px; box-shadow: 0 0 20px rgba(255,200,255,0.8); }

  /* ── 右: インフォエリア（2カラム） ── */
  #info-area { flex: 1; display: flex; flex-direction: row; gap: 16px; height: 280px; align-items: center; }

  /* 左列: タイトル・スコア・ボタン */
  #info-left { display: flex; flex-direction: column; gap: 10px; justify-content: center; flex: 0 0 160px; }

  #title { font-size: 28px; font-weight: bold; letter-spacing: 3px; color: #00ffff; text-shadow: 0 0 8px rgba(0,255,255,0.8), 0 0 20px rgba(0,200,255,0.5); line-height: 1; }
  #title-sub { font-size: 9px; letter-spacing: 4px; color: rgba(0,200,255,0.5); margin-top: 2px; }

  #score-block { display: flex; gap: 8px; }
  .score-box { background: rgba(10,10,50,0.8); border: 1px solid rgba(0,200,255,0.25); border-radius: 4px; padding: 5px 8px; min-width: 70px; box-shadow: 0 0 8px rgba(0,150,255,0.1); }
  .score-label { font-size: 9px; letter-spacing: 2px; color: rgba(0,200,255,0.55); }
  .score-value { font-size: 16px; font-weight: bold; color: #00ffff; text-shadow: 0 0 8px rgba(0,255,255,0.6); line-height: 1.2; letter-spacing: 1px; }

  #new-game-btn {
    background: rgba(0,30,60,0.8); border: 1px solid rgba(0,200,255,0.5); color: #00ffff;
    font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 3px;
    padding: 7px 0; cursor: pointer; border-radius: 3px; transition: all 0.2s ease;
    text-shadow: 0 0 6px rgba(0,255,255,0.5); box-shadow: 0 0 10px rgba(0,150,255,0.15); width: 100%;
  }
  #new-game-btn:hover { background: rgba(0,60,100,0.9); border-color: rgba(0,255,255,0.8); box-shadow: 0 0 16px rgba(0,200,255,0.4); }
  #new-game-btn:active { transform: scale(0.97); }

  /* 右列: HOW TO PLAY */
  #info-right {
    flex: 1;
    height: 240px;
    background: rgba(10,10,40,0.6);
    border: 1px solid rgba(0,200,255,0.15);
    border-radius: 6px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
  }
  #howto-title {
    font-size: 9px; letter-spacing: 4px; color: rgba(0,200,255,0.7);
    border-bottom: 1px solid rgba(0,200,255,0.15); padding-bottom: 6px; margin-bottom: 2px;
  }
  .howto-row {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 10px; color: rgba(180,200,255,0.6); letter-spacing: 0.5px; line-height: 1.4;
  }
  .howto-icon { font-size: 14px; flex-shrink: 0; margin-top: -1px; }
  .howto-keys {
    font-size: 10px; color: rgba(150,180,255,0.35); letter-spacing: 1px; margin-top: 6px;
    border-top: 1px solid rgba(0,200,255,0.1); padding-top: 6px;
  }

  /* オーバーレイ */
  #overlay {
    display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(5,5,30,0.88); border-radius: 6px; z-index: 10;
    flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    backdrop-filter: blur(2px);
  }
  #overlay.show { display: flex; }
  #overlay-msg { font-size: 13px; font-weight: bold; letter-spacing: 3px; text-align: center; line-height: 1.4; }
  #overlay-sub { font-size: 9px; letter-spacing: 2px; color: rgba(200,220,255,0.5); }
  .overlay-gameover #overlay-msg { color: #ff4060; text-shadow: 0 0 12px rgba(255,60,80,0.8); }
  .overlay-win     #overlay-msg { color: #00ffff; text-shadow: 0 0 16px rgba(0,255,255,0.9), 0 0 30px rgba(0,200,255,0.5); }
</style>
</head>
<body>
<div id="app">
  <div id="grid-area">
    <div id="grid-container">
      <div id="grid-bg"></div>
      <div id="grid-tiles"></div>
      <div id="overlay">
        <div id="overlay-msg"></div>
        <div id="overlay-sub"></div>
      </div>
    </div>
  </div>

  <div id="info-area">

    <!-- 左列: タイトル・スコア・ボタン -->
    <div id="info-left">
      <div>
        <div id="title">2048</div>
        <div id="title-sub">// STELLAR SYSTEM v1.0</div>
      </div>
      <div id="score-block">
        <div class="score-box"><div class="score-label">SCR:</div><div class="score-value" id="score-display">0</div></div>
        <div class="score-box"><div class="score-label">BEST:</div><div class="score-value" id="best-display">0</div></div>
      </div>
      <button id="new-game-btn">[ NEW GAME ]</button>
    </div>

    <!-- 右列: HOW TO PLAY -->
    <div id="info-right">
      <div id="howto-title">HOW TO PLAY</div>
      <div class="howto-row"><span class="howto-icon">🕹️</span><span>矢印キー or スワイプで<br>全タイルが一斉に移動</span></div>
      <div class="howto-row"><span class="howto-icon">💥</span><span>同じ数字がぶつかると<br>合体して数字が2倍に</span></div>
      <div class="howto-row"><span class="howto-icon">✨</span><span>移動のたびに新タイルが<br>空きマスに1個出現</span></div>
      <div class="howto-row"><span class="howto-icon">🎯</span><span><span style="color:#00ffcc">2048</span> を作ればクリア！<br>動けなくなるとゲームオーバー</span></div>
      <div class="howto-keys">↑ ↓ ← →  ARROW KEYS / SWIPE</div>
    </div>

  </div>
</div>

<script>
(function () {
  'use strict';

  const GRID  = 4;
  const CELL  = 55;  // px
  const GAP   = 5;   // px
  const STEP  = CELL + GAP; // 60px

  // タイル位置計算 (px)
  const pos = (idx) => idx * STEP;

  // ── タイル管理 ──────────────────────────
  // tile: { id, value, row, col, el }
  let tiles = [];
  let nextId = 0;
  let score = 0;
  let bestScore = parseInt(localStorage.getItem('2048_best') || '0', 10);
  let gameOver = false;
  let winShown = false;
  let animating = false;

  const gridTiles  = document.getElementById('grid-tiles');
  const gridBg     = document.getElementById('grid-bg');
  const scoreEl    = document.getElementById('score-display');
  const bestEl     = document.getElementById('best-display');
  const overlay    = document.getElementById('overlay');
  const overlayMsg = document.getElementById('overlay-msg');
  const overlaySub = document.getElementById('overlay-sub');

  // ── 初期化 ────────────────────────────
  function init() {
    tiles.forEach(t => t.el && t.el.remove());
    tiles = [];
    score = 0; gameOver = false; winShown = false; animating = false;
    hideOverlay();
    buildBg();
    addRandom(false);
    addRandom(false);
    updateScore();
  }

  function buildBg() {
    gridBg.innerHTML = '';
    for (let i = 0; i < 16; i++) {
      const c = document.createElement('div');
      c.className = 'bg-cell';
      gridBg.appendChild(c);
    }
  }

  // ── DOM タイル生成 ───────────────────
  function createTileEl(tile, isNew) {
    const el = document.createElement('div');
    el.className = 'tile ' + tileClass(tile.value) + (isNew ? ' new' : '');
    el.textContent = tile.value;
    el.style.left = pos(tile.col) + 'px';
    el.style.top  = pos(tile.row) + 'px';
    gridTiles.appendChild(el);
    tile.el = el;
  }

  function tileClass(v) {
    if (v <= 2048) return 'tile-' + v;
    return 'tile-high';
  }

  function updateTileEl(tile) {
    if (!tile.el) return;
    tile.el.style.left = pos(tile.col) + 'px';
    tile.el.style.top  = pos(tile.row) + 'px';
  }

  // ── ランダムタイル追加 ────────────────
  function addRandom(isNew = true) {
    const occupied = new Set(tiles.map(t => t.row * GRID + t.col));
    const empty = [];
    for (let i = 0; i < GRID * GRID; i++) if (!occupied.has(i)) empty.push(i);
    if (!empty.length) return;
    const idx = empty[Math.floor(Math.random() * empty.length)];
    const tile = {
      id: nextId++,
      value: Math.random() < 0.9 ? 2 : 4,
      row: Math.floor(idx / GRID),
      col: idx % GRID,
      el: null,
    };
    tiles.push(tile);
    createTileEl(tile, isNew);
    return tile;
  }

  // ── スコア更新 ────────────────────────
  function updateScore() {
    scoreEl.textContent = score;
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('2048_best', bestScore);
    }
    bestEl.textContent = bestScore;
  }

  // ── 移動 ──────────────────────────────
  function move(dir) {
    if (gameOver || animating) return;

    // 方向ごとに「行」として処理するため回転インデックスを生成
    // dir: 0=left, 1=right, 2=up, 3=down
    const lines = getLines(dir);
    let moved = false;
    let gained = 0;
    const toRemove = []; // 吸収されるタイル
    const toMerge  = []; // 合体した勝者タイル

    lines.forEach(line => {
      // line: タイルIDの配列（移動方向の先頭から順）
      const lineTiles = line.map(key => tiles.find(t => t.row === key.r && t.col === key.c)).filter(Boolean);
      if (!lineTiles.length) return;

      let cursor = 0;
      let i = 0;
      while (i < lineTiles.length) {
        const t = lineTiles[i];
        if (i + 1 < lineTiles.length && lineTiles[i].value === lineTiles[i+1].value) {
          // 合体: 後ろのタイルを前に寄せてから消す
          const loser = lineTiles[i + 1];
          setLinePos(t, cursor, dir);       // 勝者を新位置へ
          setLinePos(loser, cursor, dir);    // 敗者を同じ位置へスライド（アニメ後に消す）
          t.value *= 2;
          gained += t.value;
          toRemove.push(loser);
          toMerge.push(t);
          moved = true;
          cursor++;
          i += 2;
        } else {
          const oldR = t.row, oldC = t.col;
          setLinePos(t, cursor, dir);
          if (t.row !== oldR || t.col !== oldC) moved = true;
          cursor++;
          i++;
        }
      }
    });

    if (!moved) return;

    animating = true;
    score += gained;
    updateScore();

    // DOM位置更新（transitionが走る）
    tiles.forEach(t => updateTileEl(t));

    // transition終了後に後処理
    setTimeout(() => {
      // 敗者タイルを削除
      toRemove.forEach(t => {
        t.el && t.el.remove();
        tiles = tiles.filter(x => x.id !== t.id);
      });
      // 勝者タイルの見た目を更新 + パルスアニメ
      toMerge.forEach(t => {
        if (!t.el) return;
        t.el.className = 'tile ' + tileClass(t.value) + ' merged';
        t.el.textContent = t.value;
        // animationEndで.mergedを外す
        t.el.addEventListener('animationend', () => {
          t.el && t.el.classList.remove('merged');
        }, { once: true });
      });

      // 新タイル追加
      addRandom(true);
      animating = false;
      checkState();
    }, 130); // transitionと合わせる
  }

  // ラインの各セルにタイルを割り当てて、行/列を更新する
  function setLinePos(tile, cursor, dir) {
    if (dir === 0) { tile.col = cursor; }
    else if (dir === 1) { tile.col = GRID - 1 - cursor; }
    else if (dir === 2) { tile.row = cursor; }
    else { tile.row = GRID - 1 - cursor; }
  }

  // 方向ごとに「ライン」（行or列を先端から順に並べたセル座標配列）を返す
  function getLines(dir) {
    const lines = [];
    for (let i = 0; i < GRID; i++) {
      const line = [];
      for (let j = 0; j < GRID; j++) {
        if (dir === 0) line.push({ r: i, c: j });       // 左: 各行、左→右
        else if (dir === 1) line.push({ r: i, c: GRID-1-j }); // 右: 各行、右→左
        else if (dir === 2) line.push({ r: j, c: i });   // 上: 各列、上→下
        else line.push({ r: GRID-1-j, c: i });            // 下: 各列、下→上
      }
      lines.push(line);
    }
    return lines;
  }

  // ── ゲーム状態チェック ────────────────
  function checkState() {
    // 2048達成
    if (!winShown && tiles.some(t => t.value >= 2048)) {
      winShown = true;
      showOverlay('win', 'SYSTEM OVERRIDE', '[ CONTINUE OR NEW GAME ]');
      setTimeout(hideOverlay, 2200);
      return;
    }
    // ゲームオーバー
    if (!canMove()) {
      gameOver = true;
      showOverlay('gameover', 'GAME OVER\nSYSTEM HALT', '[ PRESS NEW GAME ]');
    }
  }

  function canMove() {
    const occupied = {};
    tiles.forEach(t => occupied[t.row * GRID + t.col] = t.value);
    for (let r = 0; r < GRID; r++) {
      for (let c = 0; c < GRID; c++) {
        if (!occupied[r * GRID + c]) return true;
        if (c + 1 < GRID && occupied[r * GRID + c] === occupied[r * GRID + c + 1]) return true;
        if (r + 1 < GRID && occupied[r * GRID + c] === occupied[(r+1) * GRID + c]) return true;
      }
    }
    return false;
  }

  // ── オーバーレイ ──────────────────────
  function showOverlay(type, msg, sub) {
    overlay.className = 'show overlay-' + type;
    overlayMsg.textContent = msg;
    overlaySub.textContent = sub;
  }
  function hideOverlay() { overlay.className = ''; }

  // ── キーボード ────────────────────────
  document.addEventListener('keydown', e => {
    const map = { ArrowLeft:0, ArrowRight:1, ArrowUp:2, ArrowDown:3 };
    if (e.key in map) { e.preventDefault(); move(map[e.key]); }
  });

  // ── タッチ ────────────────────────────
  let tx = 0, ty = 0;
  document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
    move(Math.abs(dx) > Math.abs(dy) ? (dx < 0 ? 0 : 1) : (dy < 0 ? 2 : 3));
  }, { passive: true });

  document.getElementById('new-game-btn').addEventListener('click', init);

  bestEl.textContent = bestScore;
  init();
})();
</script>
</body>
</html>
